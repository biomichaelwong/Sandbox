<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小學一年級中文下學期工作紙</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", "PingFang HK", sans-serif;
            background-color: #f4f9f4;
            color: #333;
            line-height: 1.6;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #2c7a7b;
            font-size: 28px;
        }
        .intro {
            text-align: center;
            font-size: 18px;
            margin-bottom: 30px;
            color: #555;
        }
        .question-card {
            background: #fff;
            padding: 20px 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            border-left: 5px solid #4fd1c5;
        }
        .question-text {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option-label {
            display: block;
            background: #f7fafc;
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            font-size: 18px;
            transition: all 0.2s;
        }
        .option-label:hover {
            background: #e6fffa;
            border-color: #81e6d9;
        }
        input[type="radio"] {
            margin-right: 10px;
            transform: scale(1.2);
        }
        .actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
        button {
            padding: 8px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        .btn-hint {
            background-color: #fbd38d;
            color: #744210;
        }
        .btn-hint:hover { background-color: #f6ad55; }
        
        .feedback-area {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            font-size: 16px;
        }
        .feedback-area.correct {
            background-color: #c6f6d5;
            color: #22543d;
            border-left: 4px solid #48bb78;
        }
        .feedback-area.incorrect {
            background-color: #fed7d7;
            color: #742a2a;
            border-left: 4px solid #f56565;
        }
        .hint-box {
            display: none;
            background: #fffaf0;
            padding: 10px 15px;
            margin-top: 10px;
            border-radius: 6px;
            border-left: 4px solid #ecc94b;
            color: #975a16;
        }
        .submit-container {
            text-align: center;
            margin: 40px 0;
        }
        .btn-submit {
            background-color: #319795;
            color: white;
            padding: 15px 30px;
            font-size: 20px;
            border-radius: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-submit:hover { background-color: #2c7a7b; }
        
        #result-display {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #2c7a7b;
            margin-top: 20px;
        }

        /* 列印模式設定 */
        @media print {
            body { background-color: #fff; padding: 0; }
            .question-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
            .option-label { border: none !important; background: none !important; padding: 5px 0; }
            button, .submit-container, #result-display, .feedback-area, .hint-box { display: none !important; }
            input[type="radio"] { appearance: none; -webkit-appearance: none; border: 1px solid #000; width: 15px; height: 15px; border-radius: 50%; display: inline-block; position: relative; top: 2px; }
        }
    </style>
</head>
<body>

    <h1>📝 小學一年級中文下學期溫習</h1>
    <p class="intro">請仔細閱讀題目，選出最正確的答案！準備好了嗎？加油！</p>

    <div id="quiz-container"></div>

    <div class="submit-container">
        <button class="btn-submit" onclick="checkAllAnswers()">完成，對答案！</button>
        <div id="result-display"></div>
    </div>

    <script>
        const quizData = [
            {
                q: "1. 選出適當的量詞：妹妹有一（　）紅蘋果。",
                options: ["個", "隻", "條", "本"],
                ans: 0,
                hint: "想想我們平時怎麼數水果的數量？",
                rationale: "「個」是常用的量詞，適合用來計算蘋果等圓形或沒有特定量詞的物件。"
            },
            {
                q: "2. 選出適當的量詞：公園裡有一（　）可愛的小狗。",
                options: ["隻", "張", "把", "座"],
                ans: 0,
                hint: "計算動物時，我們通常會用哪個量詞呢？",
                rationale: "「隻」是用來計算動物的專用量詞。"
            },
            {
                q: "3. 找出相反詞：「長」的反義詞是什麼？",
                options: ["短", "高", "矮", "大"],
                ans: 0,
                hint: "這條繩子一點也不長，也就是很……？",
                rationale: "「長」和「短」是一對反義詞，用來形容長度的兩極。"
            },
            {
                q: "4. 找出相反詞：「多」的反義詞是什麼？",
                options: ["少", "小", "壞", "慢"],
                ans: 0,
                hint: "籃子裡的蘋果數量不多，也就是很……？",
                rationale: "「多」和「少」是一對表示數量的反義詞。"
            },
            {
                q: "5. 選出正確的標點符號：今天的天氣真好啊（　）",
                options: ["！", "？", "。", "，"],
                ans: 0,
                hint: "這句話表達了非常強烈的讚嘆語氣。",
                rationale: "這是一句帶有強烈感情的感嘆句，句末應該用感嘆號。"
            },
            {
                q: "6. 選出正確的標點符號：你今天做完功課了嗎（　）",
                options: ["？", "。", "！", "、"],
                ans: 0,
                hint: "當你想向別人提出問題時，句尾要用什麼標點符號？",
                rationale: "這是一個提出疑問的句子，所以句末需要使用問號。"
            },
            {
                q: "7. 選出正確的標點符號：哥哥在房間裡安靜地溫習（　）",
                options: ["。", "？", "！", "，"],
                ans: 0,
                hint: "平平淡淡地說完一件事情後，句尾應該加上什麼符號？",
                rationale: "這是一個語氣平緩且完整的陳述句，句末應該用句號。"
            },
            {
                q: "8. 選出適當的代名詞填空：（　）是一隻會唱歌的小鳥。",
                options: ["牠", "他", "她", "它"],
                ans: 0,
                hint: "描述動物時，應該用哪一個部首的代名詞？",
                rationale: "「牠」是專門用來代替動物的代名詞（牛字旁）。"
            },
            {
                q: "9. 重組句子：選出排列正確的句子。",
                options: [
                    "我每天早上都自己梳洗。",
                    "我自己梳洗都每天早上。",
                    "每天早上自己梳洗我都。",
                    "我梳洗自己都每天早上。"
                ],
                ans: 0,
                hint: "試著按照「誰」在「什麼時間」做「什麼事」的順序來讀一讀。",
                rationale: "中文句子的基本結構通常是「人物 + 時間 + 動作」。"
            },
            {
                q: "10. 詞語運用：哪一個詞語最適合用來形容「下雨天」？",
                options: ["潮濕", "炎熱", "乾燥", "晴朗"],
                ans: 0,
                hint: "下雨的時候，空氣中會有很多水分，感覺會是怎樣的呢？",
                rationale: "下雨天空氣中水分多，所以環境會變得「潮濕」。"
            }
        ];

        const container = document.getElementById('quiz-container');

        // 渲染題目
        quizData.forEach((item, index) => {
            let optionsHtml = '';
            
            // 打亂選項順序，讓每次做的感覺有點不同（可選，這裡為了簡單維持原順序，只做顯示）
            // 如果要打亂，需要額外寫洗牌程式。這裡我們保留正確答案，並在內部紀錄索引。
            
            // 建立選項 HTML
            item.options.forEach((opt, optIndex) => {
                optionsHtml += `
                    <label class="option-label">
                        <input type="radio" name="q${index}" value="${optIndex}">
                        ${opt}
                    </label>
                `;
            });

            const card = document.createElement('div');
            card.className = 'question-card';
            card.innerHTML = `
                <div class="question-text">${item.q}</div>
                <div class="options">${optionsHtml}</div>
                <div class="actions">
                    <button class="btn-hint" onclick="toggleHint(${index})">💡 給我提示</button>
                </div>
                <div id="hint-${index}" class="hint-box">${item.hint}</div>
                <div id="feedback-${index}" class="feedback-area"></div>
            `;
            container.appendChild(card);
        });

        // 顯示/隱藏提示
        function toggleHint(index) {
            const hintBox = document.getElementById(`hint-${index}`);
            if (hintBox.style.display === 'none' || hintBox.style.display === '') {
                hintBox.style.display = 'block';
            } else {
                hintBox.style.display = 'none';
            }
        }

        // 檢查答案
        function checkAllAnswers() {
            let score = 0;
            
            quizData.forEach((item, index) => {
                const selected = document.querySelector(`input[name="q${index}"]:checked`);
                const feedbackBox = document.getElementById(`feedback-${index}`);
                
                feedbackBox.style.display = 'block';
                
                if (selected) {
                    const selectedVal = parseInt(selected.value);
                    if (selectedVal === item.ans) {
                        score++;
                        feedbackBox.className = 'feedback-area correct';
                        feedbackBox.innerHTML = `<strong>✅ 答對了！</strong><br>${item.rationale}`;
                    } else {
                        feedbackBox.className = 'feedback-area incorrect';
                        feedbackBox.innerHTML = `<strong>❌ 答錯了喔。</strong> 正確答案是「${item.options[item.ans]}」。<br>${item.rationale}`;
                    }
                } else {
                    feedbackBox.className = 'feedback-area incorrect';
                    feedbackBox.innerHTML = `<strong>⚠️ 你還沒有回答這題喔！</strong>`;
                }
            });

            const resultDisplay = document.getElementById('result-display');
            resultDisplay.innerHTML = `🌟 你的總分是：${score} / ${quizData.length} 🌟`;
            
            if (score === quizData.length) {
                resultDisplay.innerHTML += `<br>太棒了！全部答對！🎉`;
            } else if (score >= 6) {
                resultDisplay.innerHTML += `<br>表現得不錯喔！繼續努力！💪`;
            } else {
                resultDisplay.innerHTML += `<br>不要灰心，再溫習一下就會進步的！加油！📚`;
            }
            
            // 畫面捲動到最下方看分數
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
