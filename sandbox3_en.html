<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HKDSE Biology: Transcription & Translation Simulator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h1, h2 {
            color: #2c3e50;
            text-align: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .sequence-box {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.5rem;
            letter-spacing: 5px;
            padding: 15px;
            background-color: #e8f4f8;
            border: 2px solid #b3d4fc;
            border-radius: 5px;
            min-height: 40px;
            word-wrap: break-word;
            margin-bottom: 10px;
        }
        .label {
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-bottom: 5px;
        }
        input[type="text"] {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            padding: 10px;
            width: 100%;
            box-sizing: border-box;
            text-transform: uppercase;
            margin-bottom: 15px;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1.1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-right: 10px;
        }
        button:hover {
            background-color: #2980b9;
        }
        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        .amino-acid {
            display: inline-block;
            background-color: #e74c3c;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            margin: 5px;
            font-family: sans-serif;
            font-size: 1.2rem;
            letter-spacing: normal;
        }
        .stop-codon {
            background-color: #34495e;
        }
        .highlight {
            background-color: #f1c40f;
            transition: background-color 0.3s;
        }
    </style>
</head>
<body>

    <h1>Protein Synthesis Simulator</h1>
    <p style="text-align: center;">Visualize how DNA becomes a Polypeptide!</p>

    <div class="container">
        <h2>1. The Nucleus (DNA)</h2>
        <div class="label">Enter DNA Template Strand (A, T, C, G):</div>
        <input type="text" id="dnaInput" value="TAC CGC TCC GCC GTC GAC ATT" oninput="formatDNA(this)">
        <button id="btnTranscribe" onclick="startTranscription()">1. Transcribe to mRNA</button>
    </div>

    <div class="container">
        <h2>2. Transcription (Nucleus -> Cytoplasm)</h2>
        <div class="label">Messenger RNA (mRNA):</div>
        <div class="sequence-box" id="mrnaDisplay"></div>
        <button id="btnTranslate" onclick="startTranslation()" disabled>2. Translate to Protein</button>
    </div>

    <div class="container">
        <h2>3. Translation (At the Ribosome)</h2>
        <div class="label">Polypeptide Chain (Amino Acids):</div>
        <div class="sequence-box" id="proteinDisplay" style="background-color: #fcebeb; border-color: #f5b7b1;"></div>
    </div>

    <script>
        // Simplified Codon Table for HKDSE purposes
        const codonTable = {
            'AUG': 'Met (Start)', 'UUU': 'Phe', 'UUC': 'Phe', 'UUA': 'Leu', 'UUG': 'Leu',
            'CUU': 'Leu', 'CUC': 'Leu', 'CUA': 'Leu', 'CUG': 'Leu', 'AUU': 'Ile',
            'AUC': 'Ile', 'AUA': 'Ile', 'GUU': 'Val', 'GUC': 'Val', 'GUA': 'Val',
            'GUG': 'Val', 'UCU': 'Ser', 'UCC': 'Ser', 'UCA': 'Ser', 'UCG': 'Ser',
            'CCU': 'Pro', 'CCC': 'Pro', 'CCA': 'Pro', 'CCG': 'Pro', 'ACU': 'Thr',
            'ACC': 'Thr', 'ACA': 'Thr', 'ACG': 'Thr', 'GCU': 'Ala', 'GCC': 'Ala',
            'GCA': 'Ala', 'GCG': 'Ala', 'UAU': 'Tyr', 'UAC': 'Tyr', 'UAA': 'STOP',
            'UAG': 'STOP', 'CAU': 'His', 'CAC': 'His', 'CAA': 'Gln', 'CAG': 'Gln',
            'AAU': 'Asn', 'AAC': 'Asn', 'AAA': 'Lys', 'AAG': 'Lys', 'GAU': 'Asp',
            'GAC': 'Asp', 'GAA': 'Glu', 'GAG': 'Glu', 'UGU': 'Cys', 'UGC': 'Cys',
            'UGA': 'STOP', 'UGG': 'Trp', 'CGU': 'Arg', 'CGC': 'Arg', 'CGA': 'Arg',
            'CGG': 'Arg', 'AGU': 'Ser', 'AGC': 'Ser', 'AGA': 'Arg', 'AGG': 'Arg',
            'GGU': 'Gly', 'GGC': 'Gly', 'GGA': 'Gly', 'GGG': 'Gly'
        };

        let currentMrna = "";

        // Format user input to group by 3 and only allow ATCG
        function formatDNA(input) {
            let val = input.value.toUpperCase().replace(/[^ATCG]/g, '');
            let formatted = val.match(/.{1,3}/g)?.join(' ') || '';
            input.value = formatted;
            document.getElementById('mrnaDisplay').innerHTML = "";
            document.getElementById('proteinDisplay').innerHTML = "";
            document.getElementById('btnTranslate').disabled = true;
        }

        // DNA to mRNA rule
        function transcribeBase(base) {
            switch(base) {
                case 'A': return 'U';
                case 'T': return 'A';
                case 'C': return 'G';
                case 'G': return 'C';
                default: return '';
            }
        }

        function startTranscription() {
            const dna = document.getElementById('dnaInput').value.replace(/\s/g, '');
            const mrnaDisplay = document.getElementById('mrnaDisplay');
            const btnTranslate = document.getElementById('btnTranslate');
            
            mrnaDisplay.innerHTML = "";
            document.getElementById('proteinDisplay').innerHTML = "";
            currentMrna = "";
            btnTranslate.disabled = true;

            let i = 0;
            // Typewriter effect for transcription
            const interval = setInterval(() => {
                if (i < dna.length) {
                    let rnaBase = transcribeBase(dna[i]);
                    currentMrna += rnaBase;
                    
                    // Add spaces every 3 bases to show codons clearly
                    if (i > 0 && (i + 1) % 3 === 0 && i !== dna.length - 1) {
                        mrnaDisplay.innerHTML += rnaBase + " ";
                    } else {
                        mrnaDisplay.innerHTML += rnaBase;
                    }
                    i++;
                } else {
                    clearInterval(interval);
                    btnTranslate.disabled = false;
                }
            }, 100); // Speed of transcription animation
        }

        function startTranslation() {
            const proteinDisplay = document.getElementById('proteinDisplay');
            proteinDisplay.innerHTML = "";
            
            // Split mRNA into codons (groups of 3)
            const codons = currentMrna.match(/.{1,3}/g) || [];
            let i = 0;

            // Typewriter effect for translation
            const interval = setInterval(() => {
                if (i < codons.length) {
                    let codon = codons[i];
                    if (codon.length === 3) {
                        let aminoAcid = codonTable[codon] || "Unknown";
                        let className = aminoAcid === 'STOP' ? 'amino-acid stop-codon' : 'amino-acid';
                        proteinDisplay.innerHTML += `<span class="${className}">${aminoAcid}</span>`;
                        
                        // Stop translation if STOP codon is reached (DSE concept!)
                        if (aminoAcid === 'STOP') {
                            clearInterval(interval);
                        }
                    }
                    i++;
                } else {
                    clearInterval(interval);
                }
            }, 600); // Slower speed to simulate the ribosome reading codons
        }
    </script>
</body>
</html>
