<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HKDSE Biology: Visual Transcription Simulator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { color: #2c3e50; }
        #instruction-panel {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            width: 800px;
            text-align: center;
            font-size: 1.2rem;
            border-left: 5px solid #3498db;
        }
        svg {
            background-color: #ffffff;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            user-select: none;
        }
        .draggable {
            cursor: grab;
        }
        .draggable:active {
            cursor: grabbing;
        }
        button {
            margin-top: 20px;
            padding: 12px 24px;
            font-size: 1.1rem;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: none; /* Hidden until polymerase binds */
            transition: background-color 0.3s;
        }
        button:hover { background-color: #27ae60; }
        button:disabled { background-color: #95a5a6; cursor: not-allowed; }
    </style>
</head>
<body>

    <h1>Visualizing Transcription</h1>
    
    <div id="instruction-panel">
        <strong>Step 1:</strong> Drag the bulky <span style="color:#9b59b6; font-weight:bold;">RNA Polymerase</span> to the dashed <span style="color:#e67e22; font-weight:bold;">Promoter Region</span> on the DNA.
    </div>

    <svg id="sim-svg" width="800" height="400" viewBox="0 0 800 400">
        <text x="10" y="25" fill="#7f8c8d" font-size="14">Nucleus Environment</text>

        <rect id="promoter-zone" x="100" y="160" width="120" height="80" fill="#fdf2e9" stroke="#e67e22" stroke-width="2" stroke-dasharray="5,5" rx="5" />
        <text x="110" y="150" fill="#e67e22" font-weight="bold" font-size="14">Promoter</text>

        <g id="dna-closed">
            <line x1="50" y1="180" x2="750" y2="180" stroke="#2980b9" stroke-width="6" stroke-linecap="round"/>
            <line x1="50" y1="220" x2="750" y2="220" stroke="#2980b9" stroke-width="6" stroke-linecap="round"/>
            <path d="M 60 180 L 60 220 M 90 180 L 90 220 M 120 180 L 120 220 M 150 180 L 150 220 M 180 180 L 180 220 M 210 180 L 210 220 M 240 180 L 240 220 M 270 180 L 270 220 M 300 180 L 300 220 M 330 180 L 330 220 M 360 180 L 360 220 M 390 180 L 390 220 M 420 180 L 420 220 M 450 180 L 450 220 M 480 180 L 480 220 M 510 180 L 510 220 M 540 180 L 540 220 M 570 180 L 570 220 M 600 180 L 600 220 M 630 180 L 630 220 M 660 180 L 660 220 M 690 180 L 690 220 M 720 180 L 720 220" stroke="#34495e" stroke-width="3"/>
        </g>

        <g id="dna-open" style="display: none;">
            <path d="M 50 180 L 150 180 C 200 120, 300 120, 350 180 L 750 180" fill="none" stroke="#2980b9" stroke-width="6" stroke-linecap="round"/>
            <path d="M 50 220 L 150 220 C 200 280, 300 280, 350 220 L 750 220" fill="none" stroke="#2980b9" stroke-width="6" stroke-linecap="round"/>
            
            <path d="M 60 180 L 60 220 M 90 180 L 90 220 M 120 180 L 120 220 M 390 180 L 390 220 M 420 180 L 420 220 M 450 180 L 450 220 M 480 180 L 480 220 M 510 180 L 510 220 M 540 180 L 540 220 M 570 180 L 570 220 M 600 180 L 600 220 M 630 180 L 630 220 M 660 180 L 660 220 M 690 180 L 690 220 M 720 180 L 720 220" stroke="#34495e" stroke-width="3"/>
            
            <path d="M 180 145 L 180 160 M 210 135 L 210 150 M 240 132 L 240 147 M 270 135 L 270 150 M 300 145 L 300 160" stroke="#34495e" stroke-width="3"/> <path d="M 180 255 L 180 240 M 210 265 L 210 250 M 240 268 L 240 253 M 270 265 L 270 250 M 300 255 L 300 240" stroke="#e74c3c" stroke-width="3"/> <text x="350" y="270" fill="#e74c3c" font-size="12" font-weight="bold">Template Strand</text>
        </g>

        <path id="mrna-strand" d="" fill="none" stroke="#e74c3c" stroke-width="5" stroke-linecap="round" stroke-dasharray="4,2"/>
        <text id="mrna-label" x="0" y="0" fill="#e74c3c" font-weight="bold" font-size="14" style="display:none;">mRNA</text>

        <g id="rna-pol" class="draggable" transform="translate(400, 40)">
            <ellipse cx="60" cy="50" rx="70" ry="60" fill="#9b59b6" opacity="0.9"/>
            <path d="M -10 50 Q 60 -20 130 50 Q 60 120 -10 50" fill="#8e44ad"/>
            <text x="20" y="55" fill="white" font-weight="bold" font-size="16" pointer-events="none">RNA Pol</text>
        </g>
    </svg>

    <button id="btn-transcribe" onclick="startElongation()">Start Transcription</button>

    <script>
        const svg = document.getElementById('sim-svg');
        const rnaPol = document.getElementById('rna-pol');
        const instruction = document.getElementById('instruction-panel');
        const btnTranscribe = document.getElementById('btn-transcribe');
        const dnaClosed = document.getElementById('dna-closed');
        const dnaOpen = document.getElementById('dna-open');
        const promoterZone = document.getElementById('promoter-zone');
        const mrnaStrand = document.getElementById('mrna-strand');
        const mrnaLabel = document.getElementById('mrna-label');

        let isDragging = false;
        let isBound = false;
        let pt = svg.createSVGPoint();

        // Convert mouse screen coordinates to SVG coordinates
        function getMousePosition(evt) {
            pt.x = evt.clientX;
            pt.y = evt.clientY;
            return pt.matrixTransform(svg.getScreenCTM().inverse());
        }

        rnaPol.addEventListener('mousedown', (evt) => {
            if (isBound) return; // Prevent dragging after it binds
            isDragging = true;
        });

        window.addEventListener('mousemove', (evt) => {
            if (isDragging) {
                evt.preventDefault();
                let mousePos = getMousePosition(evt);
                // Center the polymerase on the mouse
                let x = mousePos.x - 60; 
                let y = mousePos.y - 50;
                rnaPol.setAttribute('transform', `translate(${x}, ${y})`);
            }
        });

        window.addEventListener('mouseup', (evt) => {
            if (isDragging) {
                isDragging = false;
                let mousePos = getMousePosition(evt);
                
                // Check if dropped near the promoter zone (approx x: 100-220, y: 160-240)
                if (mousePos.x > 80 && mousePos.x < 240 && mousePos.y > 120 && mousePos.y < 280) {
                    bindPolymerase();
                } else {
                    // Snap back if missed
                    rnaPol.setAttribute('transform', `translate(400, 40)`);
                }
            }
        });

        function bindPolymerase() {
            isBound = true;
            rnaPol.classList.remove('draggable');
            
            // Snap to exact promoter position
            rnaPol.setAttribute('transform', `translate(100, 150)`);
            
            // Visual changes: Unwind DNA
            dnaClosed.style.display = 'none';
            dnaOpen.style.display = 'block';
            promoterZone.style.display = 'none'; // hide the dashed box

            // Update instructions
            instruction.innerHTML = "<strong>Step 2:</strong> Excellent! The enzyme has broken the hydrogen bonds, unwinding the double helix to form a <em>transcription bubble</em>. Click the button to elongate the mRNA.";
            instruction.style.borderLeftColor = "#2ecc71";
            btnTranscribe.style.display = "block";
        }

        function startElongation() {
            btnTranscribe.disabled = true;
            instruction.innerHTML = "<strong>Step 3 (Elongation):</strong> Watch RNA Polymerase move along the template strand, adding complementary RNA nucleotides to build the mRNA transcript.";
            
            let currentX = 100;
            const endX = 600;
            mrnaLabel.style.display = "block";

            function animate() {
                if (currentX < endX) {
                    currentX += 2; // Speed of transcription
                    rnaPol.setAttribute('transform', `translate(${currentX}, 150)`);
                    
                    // Draw the growing mRNA tail coming out of the polymerase
                    let startTailX = currentX + 60;
                    let tailPath = `M ${startTailX} 200 Q ${startTailX - 50} 250 ${startTailX - 100} 320`;
                    mrnaStrand.setAttribute('d', tailPath);
                    
                    // Move the label
                    mrnaLabel.setAttribute('x', startTailX - 130);
                    mrnaLabel.setAttribute('y', 340);

                    // Optional: You could write logic here to move the "DNA Open" bubble along with it, 
                    // but for visual simplicity, watching the mRNA extrude makes the point!

                    requestAnimationFrame(animate);
                } else {
                    instruction.innerHTML = "<strong>Step 4 (Termination):</strong> The sequence is complete! The mRNA detaches and will now leave the nucleus for translation at the ribosome.";
                    mrnaStrand.setAttribute('stroke-dasharray', '0'); // Make it a solid line at the end
                    rnaPol.setAttribute('opacity', '0.3'); // Make enzyme fade out
                }
            }
            animate();
        }
    </script>
</body>
</html>
